# Publishes the workspace packages to npm. Manual trigger on purpose: publishing
# is a release decision, not a side effect of merging.
#
# Idempotent: `pnpm publish -r` only publishes packages whose current version is
# not on the registry yet — re-running after a partial failure is safe, and a run
# where nothing was bumped publishes nothing. Private packages (the editor) are
# skipped. To release: bump the version(s) in packages/*/package.json, merge, run this.
#
# Auth is npm trusted publishing (OIDC): each package's npm settings name this
# repo + this workflow file as its trusted publisher, and `id-token: write` lets
# pnpm exchange the Actions identity for publish rights. No NPM_TOKEN secret to
# create, rotate or leak, and provenance comes with it — the package page proves
# the tarball was built from this repo by this workflow.
# The very first publish of a NEW package can't use this (npm requires the
# package to exist before a trusted publisher can be configured): publish it
# once by hand, add the trusted publisher in its npm settings, done.
name: Publish to npm

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test
      # No token: pnpm picks up the Actions OIDC identity on its own.
      - run: pnpm publish -r --access public --no-git-checks
